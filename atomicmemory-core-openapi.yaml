  /v1/storage/capabilities:
    get:
      description: Public preflight surface for the storage API. Clients call this before attempting a managed-mode artifact upload. The response describes what the direct `/v1/storage/artifacts/*` API supports for the active backend — Filecoin direct managed upload is not yet supported in v1, so every capability flag reports `false` for Filecoin here. Filecoin still has full feature support through document ingestion (see `/v1/documents/limits`).
      operationId: getStorageCapabilities
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: false
                description: "Capability snapshot for the direct storage API (`/v1/storage/artifacts/*`). Composition-time projection; no per-user state. Document ingestion's own capability surface lives at `/v1/documents/limits` and may report different flags (e.g. Filecoin reports `supportsContentHash: true` through documents but `false` here in v1 because direct managed Filecoin upload is not yet supported)."
                properties:
                  addressing:
                    items:
                      description: How the backend addresses stored bytes.
                      enum:
                        - location
                        - content
                        - provider_native
                      type: string
                    type: array
                  availabilityModel:
                    description: Coarse availability category for the backend.
                    enum:
                      - immediate
                      - delayed
                      - scheduled
                      - best_effort
                    type: string
                  consistency:
                    description: When bytes become retrievable after put.
                    enum:
                      - immediate
                      - eventual
                    type: string
                  deleteSemantics:
                    items:
                      description: What the backend does on delete. `delete` issues provider removal; `unpin` removes the AtomicMemory reference only; `tombstone` stops managing without provider removal (typical for decentralized providers); `provider_retained` is reserved.
                      enum:
                        - delete
                        - unpin
                        - tombstone
                        - provider_retained
                      type: string
                    type: array
                  maxUploadBytes:
                    exclusiveMinimum: 0
                    type: integer
                  minUploadBytes:
                    minimum: 0
                    type: integer
                  provider:
                    type: string
                  supportedBundleFormats:
                    items:
                      type: string
                    type: array
                  supportsBundles:
                    type: boolean
                  supportsContentAddressedUri:
                    type: boolean
                  supportsContentHash:
                    type: boolean
                  supportsDelete:
                    type: boolean
                  supportsDirectUpload:
                    type: boolean
                  supportsProviderProofs:
                    type: boolean
                  supportsRangeRead:
                    type: boolean
                  supportsReplication:
                    type: boolean
                  supportsRetrievalStatus:
                    type: boolean
                  supportsTombstone:
                    type: boolean
                  supportsVerification:
                    type: boolean
                required:
                  - provider
                  - addressing
                  - consistency
                  - supportsDirectUpload
                  - supportsRangeRead
                  - supportsDelete
                  - supportsTombstone
                  - supportsBundles
                  - supportedBundleFormats
                  - supportsVerification
                  - supportsProviderProofs
                  - supportsReplication
                  - supportsRetrievalStatus
                  - supportsContentHash
                  - supportsContentAddressedUri
                  - deleteSemantics
                  - availabilityModel
                type: object
          description: Capability snapshot for the direct storage API.
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
        "502":
          content:
            application/json:
              schema:
                description: Upstream AI provider failure envelope (502 / 503).
                example:
                  details: "Incorrect API key provided: [REDACTED_API_KEY]."
                  error: Upstream provider authentication failed
                  error_code: upstream_provider_auth_failed
                  message: The configured AI provider rejected the request credentials. Check the provider API key and account access.
                  provider_status: 401
                  retryable: false
                properties:
                  details:
                    type: string
                  error:
                    type: string
                  error_code:
                    enum:
                      - upstream_provider_auth_failed
                      - upstream_provider_rate_limited
                      - upstream_provider_quota_exceeded
                      - upstream_provider_error
                    type: string
                  message:
                    type: string
                  provider_status:
                    type: integer
                  retryable:
                    type: boolean
                required:
                  - error_code
                  - error
                  - message
                  - provider_status
                  - retryable
                  - details
                type: object
          description: Upstream AI provider returned an unrecoverable failure (auth, non-retryable 4xx).
        "503":
          content:
            application/json:
              schema:
                description: Upstream AI provider failure envelope (502 / 503).
                example:
                  details: "Incorrect API key provided: [REDACTED_API_KEY]."
                  error: Upstream provider authentication failed
                  error_code: upstream_provider_auth_failed
                  message: The configured AI provider rejected the request credentials. Check the provider API key and account access.
                  provider_status: 401
                  retryable: false
                properties:
                  details:
                    type: string
                  error:
                    type: string
                  error_code:
                    enum:
                      - upstream_provider_auth_failed
                      - upstream_provider_rate_limited
                      - upstream_provider_quota_exceeded
                      - upstream_provider_error
                    type: string
                  message:
                    type: string
                  provider_status:
                    type: integer
                  retryable:
                    type: boolean
                required:
