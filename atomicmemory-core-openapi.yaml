  /v1/storage/artifacts/{id}:
    delete:
      description: Reference-aware delete. Default `policy=artifact_only` returns 409 `artifact_in_use` if any active document references the artifact; `policy=with_documents` cascades a soft-delete to those documents first. No `force` parameter is supported.
      operationId: deleteStorageArtifact
      parameters:
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
        - description: Delete behaviour when documents reference the artifact. `artifact_only` (default) returns 409 `artifact_in_use` if any non-deleted documents reference it. `with_documents` cascades a soft-delete to those documents first.
          in: query
          name: policy
          required: false
          schema:
            description: Delete behaviour when documents reference the artifact. `artifact_only` (default) returns 409 `artifact_in_use` if any non-deleted documents reference it. `with_documents` cascades a soft-delete to those documents first.
            enum:
              - artifact_only
              - with_documents
            type: string
