  /v1/capabilities:
    get:
      description: Unauthenticated. A protocol-level caller (e.g. a control-plane service) GETs this at startup to negotiate the core feature surface WITHOUT the JS SDK. Mirrors the SDK provider`s capabilities() descriptor over the wire. Like `/health`, it advertises a static capability surface (no user data), so it waives the document-level bearer requirement.
      operationId: getCapabilities
      responses:
        "200":
          content:
            application/json:
              schema:
                description: Wire capabilities descriptor. What the running core advertises to a protocol-level caller that negotiates at startup without the JS SDK.
                properties:
                  deterministic_fast_path:
                    type: boolean
                  extensions:
                    properties:
                      health:
