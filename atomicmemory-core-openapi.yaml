    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: AtomicMemory HTTP API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/admin/scope:
    delete:
      description: Mounted only when CORE_ADMIN_API_KEY and CORE_TEST_SCOPE_ALLOW_PATTERN are both configured. The server refuses user_id values that do not match the configured test-scope pattern.
      operationId: deleteAdminScope
      requestBody:
        content:
          application/json:
            schema:
              properties:
                user_id:
                  minLength: 1
                  type: string
              required:
                - user_id
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  deleted:
                    minimum: 0
                    type: integer
                required:
                  - deleted
                type: object
          description: Number of memories deleted for the requested scope.
        "400":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Input validation error
        "401":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Missing or invalid bearer token
        "403":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Request is authenticated but not allowed
        "500":
          content:
            application/json:
              schema:
                description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
                example:
                  error: user_id is required
                properties:
                  error:
                    type: string
                required:
                  - error
                type: object
          description: Internal server error
      security:
        - adminBearerAuth: []
      summary: Delete one allowed disposable test scope.
      tags:
        - Admin
