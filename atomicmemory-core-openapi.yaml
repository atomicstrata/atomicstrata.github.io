components:
  parameters: {}
  schemas:
    AdminDeleteScopeBody:
      properties:
        user_id:
          minLength: 1
          type: string
      required:
        - user_id
      type: object
    AdminDeleteScopeResponse:
      properties:
        deleted:
          minimum: 0
          type: integer
      required:
        - deleted
      type: object
    ErrorBasic:
      description: Standard error envelope. 400 for input validation errors, 500 for uncaught exceptions.
      example:
        error: user_id is required
      properties:
        error:
          type: string
      required:
        - error
      type: object
    ErrorConfig400:
      description: Richer 400 envelope for PUT /v1/memories/config when startup-only fields are included.
      example:
        detail: Fields embedding_provider cannot be mutated at runtime — the embedding/LLM provider caches are fixed at first use.
        error: Provider/model selection is startup-only
        rejected:
          - embedding_provider
      properties:
        detail:
          type: string
        error:
          type: string
        rejected:
          items:
            type: string
          type: array
      required:
        - error
        - detail
        - rejected
      type: object
    ErrorConfig410:
      description: 410 Gone envelope for PUT /v1/memories/config when runtime mutation is disabled.
      example:
        detail: Set CORE_RUNTIME_CONFIG_MUTATION_ENABLED=true to enable runtime mutation in dev/test environments.
        error: PUT /v1/memories/config is deprecated for production
      properties:
        detail:
          type: string
        error:
          type: string
      required:
        - error
        - detail
      type: object
    ErrorUpstreamProvider:
      description: Upstream AI provider failure envelope (502 / 503).
      example:
        details: "Incorrect API key provided: [REDACTED_API_KEY]."
        error: Upstream provider authentication failed
        error_code: upstream_provider_auth_failed
        message: The configured AI provider rejected the request credentials. Check the provider API key and account access.
        provider_status: 401
        retryable: false
      properties:
        details:
          type: string
        error:
          type: string
        error_code:
          enum:
            - upstream_provider_auth_failed
            - upstream_provider_rate_limited
            - upstream_provider_quota_exceeded
            - upstream_provider_error
          type: string
        message:
          type: string
        provider_status:
          type: integer
        retryable:
          type: boolean
      required:
        - error_code
        - error
        - message
        - provider_status
        - retryable
        - details
      type: object
  securitySchemes:
    adminBearerAuth:
      description: "Send `Authorization: Bearer <CORE_ADMIN_API_KEY>` on admin-only cleanup requests. This scheme is separate from normal client auth."
      scheme: bearer
      type: http
    bearerAuth:
      description: "Send `Authorization: Bearer <CORE_API_KEY>` on every request. The key is the deployment-wide secret configured via `CORE_API_KEY`; the middleware uses constant-time comparison."
      scheme: bearer
      type: http
info:
  description: Semantic memory engine for AI applications. Request/response bodies are JSON; fields on the wire use snake_case.
