  /v1/storage/artifacts:
    post:
      description: 'Pointer mode sends a JSON body with `mode: "pointer"` plus a caller-supplied `uri`; the server stores the reference but NEVER fetches the URI. Managed mode sends the raw bytes with `?mode=managed[&disclose_content_hash=true]` and an optional `X-AtomicMemory-Metadata` base64-JSON header. Filecoin direct managed uploads return 501 in v1.'
      operationId: putStorageArtifact
      requestBody:
        content:
          application/json:
            schema:
              description: Discriminated union over put-artifact mode.
              oneOf:
                - additionalProperties: false
                  description: Pointer-mode artifact registration body. The server stores the URI as a reference; it NEVER fetches the URI itself.
                  properties:
                    content_hash:
                      minLength: 1
                      type: string
                    content_type:
                      minLength: 1
                      type: string
                    metadata:
                      additionalProperties:
                        anyOf:
                          - type: string
                          - type: number
                          - type: boolean
                      description: Caller-supplied metadata. Decoded JSON must be ≤4 KiB; encoded header value must be ≤8 KiB when sent via `X-AtomicMemory-Metadata`.
                      type: object
                    mode:
                      enum:
                        - pointer
                      type: string
                    size_bytes:
                      minimum: 0
                      type: integer
                    uri:
                      minLength: 1
                      type: string
                  required:
                    - mode
                    - uri
                    - content_type
                  type: object
                - additionalProperties: false
                  description: Managed-mode marker. The route uses query params for the managed-mode contract; the body is raw bytes, not JSON. Included in the discriminated union so a managed-mode JSON body (caller mistake) parses cleanly and is rejected at the route layer.
                  properties:
                    mode:
                      enum:
                        - managed
                      type: string
                  required:
                    - mode
                  type: object
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                additionalProperties: false
                description: Public metadata projection of a `storage_artifacts` row. `content_hash` is the plaintext SHA-256 of caller bytes; the internal `stored_hash` column is NEVER surfaced on the wire.
                properties:
                  artifact_id:
                    format: uuid
                    type: string
                  content_encoding:
                    enum:
                      - identity
                      - aes_gcm
                    type: string
                  content_hash:
                    type: string
                  content_type:
                    type:
                      - string
                      - "null"
                  created_at:
                    type: string
                  identifiers:
                    additionalProperties:
                      type: string
                    description: Provider-native identifiers (CID, etc.); allowlisted per provider.
                    type: object
                  lifecycle:
                    additionalProperties: false
                    description: Provider-agnostic summary of availability + delete-semantics. Both fields are optional so a row whose lifecycle is not yet known to the API surface validates cleanly.
                    properties:
                      availability:
                        description: Coarse availability category for the backend.
                        enum:
                          - immediate
                          - delayed
                          - scheduled
                          - best_effort
                        type: string
                      deleteSemantics:
                        description: What the backend does on delete. `delete` issues provider removal; `unpin` removes the AtomicMemory reference only; `tombstone` stops managing without provider removal (typical for decentralized providers); `provider_retained` is reserved.
                        enum:
                          - delete
                          - unpin
                          - tombstone
                          - provider_retained
                        type: string
                    type: object
                  metadata:
                    additionalProperties:
                      anyOf:
